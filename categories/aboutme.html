 }

    let surveyData = []; // 현재 선택된 설문 데이터

    };

    // 설문 데이터 정의
typeSelect.addEventListener('change', (e) => {
    const selectedType = e.target.value;
    
    // 3. 조건부 상태 활용 (Optional Chaining 및 기본값 설정)
    surveyData = surveyConfigs[selectedType] || [];

    console.log("선택된 설문 데이터:", surveyData);
    if(surveyData.length > 0) {
        state.catIdx = 0;
        state.queIdx = 0;
        state.doneCount = 0;
        state.totalCount = surveyData.reduce((sum, cat) => sum + cat.questions.length, 0);
        addMessage(`"${typeSelect.options[typeSelect.selectedIndex].text}" 설문이 선택되었습니다. 진단을 시작합니다.`, 'bot');
    }
    // 이후 surveyData를 활용해 UI를 렌더링하는 함수를 호출하면 됩니다.
    renderQuestion();
});



    // 초기화
    document.addEventListener('DOMContentLoaded', () => {
        renderQuestion();
        document.getElementById('send-btn').addEventListener('click', handleAnswer);
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAnswer();
        });
    });

    // 질문 렌더링
    function renderQuestion() {
        if(surveyData.length === 0) {
            addMessage("설문지를 선택해주세요.", 'bot');
            return;
        }
        
        const qText = surveyData[state.catIdx].questions[state.queIdx];
        addMessage(`[${surveyData[state.catIdx].title}] ${qText}`, 'bot');
        updateUI();
    }

    // 메시지 추가
    function addMessage(text, type) {
        const chatWin = document.getElementById('chat-window');
        const msg = document.createElement('div');
        msg.className = `bubble ${type}`;
        msg.innerText = text;
        chatWin.appendChild(msg);
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    // 답변 제출 로직
    function handleAnswer() {
        const input = document.getElementById('answer-input');
        const val = input.value.trim();
        if (!val) return;

        addMessage(val, 'user');
        saveToStorage(val);
        input.value = "";

        // 이어쓰기 확인 로직
        setTimeout(() => {
            if (confirm("다음 문항으로 넘어가시겠습니까?\n(취소 시 현재 문항 보충 작성)")) {
                moveNext();
            } else {
                addMessage("현재 문항에 내용을 이어서 입력해주세요.", 'bot');
            }
        }, 100);
    }

    // 데이터 저장 (SessionStorage)
    function saveToStorage(answer) {
        const key = `survey_ans_${state.catIdx}_${state.queIdx}`;
        const prev = sessionStorage.getItem(key) || "";
        sessionStorage.setItem(key, prev ? `${prev} ${answer}` : answer);
    }

    // 다음 단계 이동
    function moveNext() {
        state.doneCount++;
        state.queIdx++;

        if (state.queIdx >= surveyData[state.catIdx].questions.length) {
            state.catIdx++;
            state.queIdx = 0;
        }

        if (state.catIdx >= surveyData.length) {
            console.log('donecount:', state.doneCount, 'totalcount:', state.totalCount); 
            updateUI();
            completeSurvey();
        } else {
            renderQuestion();
        }
    }

    // UI 업데이트 (진행도)
    function updateUI() {
        const percent = Math.floor((state.doneCount / state.totalCount) * 100);
        document.getElementById('progress-fill').style.width = `${percent}%`;
        document.getElementById('progress-percent').innerText = `${percent}%`;
        document.getElementById('cat-title').innerText = state.catIdx < surveyData.length ? `Ch.${state.catIdx + 1}. ${surveyData[state.catIdx].title}` :  "설문 완료";
    }

    // 종료 처리
    function completeSurvey() {
        document.getElementById('input-control').classList.add('hidden');
        document.getElementById('final-step').classList.remove('hidden');
        addMessage("설문이 모두 끝났습니다. 고생하셨습니다!", 'bot');
    }

    // 기능 확장용 함수들

        for(let i = 0; i < sessionStorage.length; i++) {
            const key = sessionStorage.key(i);
            if (key.startsWith('survey_ans_')) {
                const data = sessionStorage.getItem(key);
                const match = key.match(/survey_ans_(\d+)_(\d+)/);
                if (match) {
                    const catIdx = parseInt(match[1]);
                    const queIdx = parseInt(match[2]);
                    const qText = surveyData[catIdx]?.questions[queIdx] || "질문 텍스트 없음";
                    //console.log({ catIdx, queIdx, qText, answer: data });
                    surveyResults.push({ catIdx, queIdx, qText, answer: data });
