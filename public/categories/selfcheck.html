<div id="sub_content">

        <div class="test_wrap-wrap">

            </div>

            <div class="test_table_wrap">

                            <th>가끔<br>그럼</th>
                            <th>자주<br>그럼</th>
                            <th>항상<br>그럼</th>
                        </tr>
                    </thead>
                    <tbody id="survey-tbody">
                        </tbody>
                </table>
            </div>

            <div id="result-area" class="result_box">
                <div class="result_inner">
                    <div class="score_circle">

                    </div>
                    <p id="my_res"></p>
                    <div class="btn_group">

            </div>
        </div>
    </div>

const targetDataMap = {
    "adult": surveyAdult,
    "student": surveyStudent
};

let currentTargetKey = "adult"; // 현재 선택된 타겟 (기본값)

$(document).ready(function() {
renderTargetTabs(); // 1. 상위 타겟 탭 생성

// 탭 메뉴 토글
function renderTargetTabs() {
    const $tabs = $('#target-tabs').empty();
    Object.entries(surveyTarget).forEach(([key, value]) => {
        const isActive = key === currentTargetKey ? 'active' : '';
        $tabs.append(`
            <li class="${isActive}" data-target="${key}" onclick="changeTarget('${key}', this)">
                <a href="javascript:;">${value}</a>
            </li>
        `);
    });
}

// 타겟 변경 시 실행되는 함수
function changeTarget(targetKey, el) {
    currentTargetKey = targetKey;
    
    // 탭 활성화 UI 변경
    $('#target-tabs li').removeClass('active');
    $(el).addClass('active');

    // 하위 카테고리 탭 갱신 및 첫 번째 설문 로드
    updateCategoryTabs(targetKey);
}

// 하위 카테고리 탭 생성 (우울증 / ADHD 등)
function updateCategoryTabs(targetKey) {
    const $tabs = $('#category-tabs').empty();
    const masterData = targetDataMap[targetKey];

    masterData.forEach((item, idx) => {
        const isActive = idx === 0 ? 'active' : '';
        $tabs.append(`
            <li class="${isActive}" onclick="loadSurvey(${idx}, this)">
                <a href="javascript:;">${item.category}</a>
            </li>
        `);
    });

    // 해당 타겟의 첫 번째 설문 내용을 화면에 로드
    loadSurvey(0);
}

// 질문지 테이블 렌더링
function loadSurvey(idx, el) {
    if(el) {
        $('#category-tabs li').removeClass('active');
        $(el).addClass('active');
    }

    const masterData = targetDataMap[currentTargetKey];
    const labels = ["전혀 아님", "가끔 그럼", "자주 그럼", "항상 그럼"]; // 라벨 정의
    currentSurvey = masterData[idx];

    $('#target-label').text(currentSurvey.target);
    $('#cat-description').text(`${currentSurvey.category} 진단 항목입니다. 각 문항을 읽고 체크해 주세요.`);
    $('#result-area').hide();
    $('#result-btn').fadeIn();

    const $tbody = $('#survey-tbody').empty();
    currentSurvey.questions.forEach((q, qIdx) => {
        const row = `
            <tr>
                <td><span class="num">${String(qIdx+1).padStart(2, '0')}</span> ${q}</td>
                <td data-label="${labels[0]}"><input type="radio" name="q_${qIdx}" value="1"></td>
                <td data-label="${labels[1]}"><input type="radio" name="q_${qIdx}" value="2"></td>
                <td data-label="${labels[2]}"><input type="radio" name="q_${qIdx}" value="3"></td>
                <td data-label="${labels[3]}"><input type="radio" name="q_${qIdx}" value="4"></td>            
            </tr>
        `;
        $tbody.append(row);
    });
}

// 결과값 저장   
     function saveToStorage(idx, target, category, question, answer) {
        const key = `selfcheck_answers_${idx}`;
        // console.log(`Saving to storage: ${key} = ${answer}`);
        const prev =   "";
        sessionStorage.setItem(key, [answer, target, category, question].join("|"));
    }

    function resetStorage() {
        for(let i =0; i<sessionStorage.length; i++) {
            const key = sessionStorage.key(i);
            if(key.startsWith("selfcheck_answers_")) {
                sessionStorage.clear(key);
            }
        }
    }

// 결과 계산
function calculateResult() {
    let score = 0;
    let complete = true;
    
    resetStorage();
    
    currentSurvey.questions.forEach((_, idx) => {
        const val = $(`input[name="q_${idx}"]:checked`).val();
        if(val === undefined) complete = false;
        else {
            score += parseInt(val);
            // console.log(currentSurvey.questions[idx], "선택값:", val, "누적 점수:", score);
            // console.log(currentSurvey.category);
            // console.log(currentSurvey.target);

            saveToStorage( idx, currentSurvey.target, currentSurvey.category, currentSurvey.questions[idx], parseInt(val));
         }
    });

    if(!complete) {
        alert("모든 문항에 체크해 주세요.");
        return;
    }

    let resultTxt = "결과 데이터가 없습니다.";
    currentSurvey.results.forEach(res => {
        if(score >= res.min && score <= res.max) resultTxt = res.text;
    });



    $('#my_score').text(score);
    $('#my_res').html(resultTxt);
    $('#result-area').fadeIn();
    $('#result-btn').hide();
    // 결과 확인 후 하단으로 스크롤
    $('html, body').animate({ scrollTop: $('#result-area').offset().top - 100 }, 500);
}

function resetSurvey() {
    $('input[type="radio"]').prop('checked', false);
    $('#result-area').hide();
    $('#result-btn').fadeIn();
    window.scrollTo(0, 0);
}
